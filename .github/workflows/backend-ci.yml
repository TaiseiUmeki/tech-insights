name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-check:
    name: Ruff Linting & Formatting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (3.11 to match backend Dockerfile)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff==0.8.4

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

  architecture-check:
    name: Onion Architecture Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (3.11 to match backend Dockerfile)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run onion architecture dependency checker
        run: python scripts/check_onion_architecture.py

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [ruff-check, architecture-check, build-check]

    defaults:
      run:
        working-directory: backend

    # テスト用のDBコンテナを立ち上げる設定
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # DBが立ち上がるまで待つヘルスチェック（重要）
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (3.11 to match backend Dockerfile)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Domain Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          POSTGRES_PORT: 5432
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          STAGE: test
        run: pytest tests/domain -v

      - name: Run Application Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          POSTGRES_PORT: 5432
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          STAGE: test
        run: pytest tests/application -v

      - name: Run Integration Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          POSTGRES_PORT: 5432
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          STAGE: test
        run: pytest tests/infrastructure tests/presentation -v

      - name: Generate Coverage Report
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          POSTGRES_PORT: 5432
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          STAGE: test
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  build-check:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          echo "Building Docker image from backend/Dockerfile"
          docker build \
            --file backend/Dockerfile \
            --tag backend-build-check:${{ github.sha }} \
            backend
          echo "✅ Docker build completed successfully"

      - name: Smoke test - Container startup
        run: |
          set -e
          echo "Checking container startup logs..."

          # Create CI environment file with dummy values
          cat > backend/.env.ci <<'EOF'
          # Application
          ENVIRONMENT=test

          # Database (dummy values for build check)
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          POSTGRES_DB=test_db
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432

          # Database URL for SQLAlchemy (dummy)
          DATABASE_URL=postgresql+psycopg2://test_user:test_password@localhost:5432/test_db

          EOF

          container_name="backend-startup-check"

          # Cleanup function
          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            rm -f backend/.env.ci
          }
          trap cleanup EXIT

          # Start container in detached mode
          echo "Starting container..."
          docker run -d \
            --name "$container_name" \
            --env-file backend/.env.ci \
            backend-build-check:${{ github.sha }}

          # Wait for startup log (max 60 seconds)
          echo "Waiting for application startup..."
          for i in {1..12}; do
            logs=$(docker logs "$container_name" 2>&1)

            # Check for fatal errors first (RuntimeError, Exception, etc.)
            if echo "$logs" | grep -qi "RuntimeError\|Exception\|Traceback"; then
              echo "❌ Error detected in startup logs"
              echo "--- Container logs ---"
              echo "$logs"
              exit 1
            fi

            # Check for successful application startup
            if echo "$logs" | grep -q "Application startup complete"; then
              echo "✅ Application startup complete detected"
              echo "--- Container logs ---"
              echo "$logs"
              exit 0
            fi

            # Check if container is still running
            if ! docker ps | grep -q "$container_name"; then
              echo "❌ Container stopped unexpectedly"
              echo "--- Container logs ---"
              echo "$logs"
              exit 1
            fi

            echo "Attempt $i/12: Waiting for startup..."
            sleep 5
          done

          # After timeout, check final state
          logs=$(docker logs "$container_name" 2>&1)

          # If no errors and container is still running, consider it successful
          if echo "$logs" | grep -qi "RuntimeError\|Exception\|Traceback"; then
            echo "❌ Error found in final check"
            echo "--- Container logs ---"
            echo "$logs"
            exit 1
          elif docker ps | grep -q "$container_name"; then
            echo "✅ Container is running without errors"
            echo "--- Container logs ---"
            echo "$logs"
            exit 0
          else
            echo "❌ Container stopped or startup verification timed out"
            echo "--- Container logs ---"
            echo "$logs"
            exit 1
          fi
