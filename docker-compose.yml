services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - AUTO_IMPORT_ARTICLES=true
      - ARTICLES_CSV_PATH=/docs/articles.csv
      - TEST_DATABASE_URL=postgresql+psycopg2://app_user:app_password@db:5432/ai_solution_test_db
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro
    working_dir: /app
    depends_on:
      migrator:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # ブラウザ（クライアント側）からのAPI URL
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  db:
    # pgvector 拡張入りの Postgres 15 公式イメージ（vector embedding 対応）
    image: pgvector/pgvector:pg15
    container_name: postgres_container_ai_solution
    env_file: ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      # データを永続化するためのボリュームをマウント
      - ./db_data:/var/lib/postgresql/data
      # 初回起動時に pgvector 拡張を作成
      - ./tools/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d ai_solution_db"]
      timeout: 20s
      retries: 10
      interval: 5s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ai_solution
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db

  migrator:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    working_dir: /app
    command: ["alembic", "upgrade", "head"]

  # ====================================================================
  # オプションサービス（テンプレ採用時にプロジェクトで使うものだけ有効化）
